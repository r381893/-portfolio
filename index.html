<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專案集 | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">

            <h1>🚀 我的專案集</h1>
            <p class="subtitle">交易分析與投資工具</p>

        <div class="filter-buttons">

            <button class="filter-btn" data-filter="streamlit">Streamlit</button>

        <main class="projects-grid" id="projects-container">
            <!-- Projects will be injected by JavaScript -->
        </main>

        <footer>
            <p>© 2024 - 持續更新中</p>
        </footer>
    </div>

    <script src="projects.js"></script>
    <script src="app.js"></script>

</html>
